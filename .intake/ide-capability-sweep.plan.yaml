goal: Extensively test the PhpStorm MCP and safe IDE action surface for future skill design.
status: completed
scope:
  direct_mcp_tools:
    - get_php_project_config
    - search_file
    - find_files_by_glob
    - find_files_by_name_keyword
    - search_in_files_by_text
    - search_in_files_by_regex
    - get_file_problems
    - get_inspections
    - apply_quick_fix
    - run_inspection_kts
    - reformat_file
    - rename_refactoring
    - open_file_in_editor
    - get_run_configurations
    - execute_run_configuration
    - execute_terminal_command
    - search_ide_actions
    - invoke_ide_action
  ide_action_families:
    safe_to_discover:
      - inspections
      - cleanup
      - refactoring
      - usages
      - hierarchy
      - composer
      - database
      - diagrams
      - debug
      - generation
      - imports
      - coverage
    safe_to_invoke_in_sweep:
      - open editor for disposable fixture files
      - non-mutating terminal commands
      - possibly UI-focus actions with no project mutations
    classify_only:
      - safe delete
      - code cleanup
      - composer install/update
      - database import/export/alter/run script
      - debug listener toggles
      - diagram exports with unclear output target
safety_rules:
  - Keep all source changes under .intake.
  - Do not invoke destructive or broad IDE actions.
  - Prefer read-only discovery for database and Composer.
  - Record failed probes as capability evidence.
  - Validate fixtures after refactor or quick-fix changes.
success_criteria:
  - completed: A capability matrix exists.
  - completed: Each callable MCP tool is tested, classified, or explicitly blocked.
  - completed: Hidden-gem IDE action families are cataloged with safe usage notes.
  - completed: Findings are documented in .intake/experience.
