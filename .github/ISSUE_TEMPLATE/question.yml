name: Question
description: Ask a question about using or maintaining the phpstorm-mcp skill
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do and where you are stuck.
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installing the skill
        - Using PhpStorm MCP
        - Tool routing
        - Safety boundaries
        - Capability sweeps
        - Packaging
        - Other
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include non-private examples, versions, and commands that help explain the question.
