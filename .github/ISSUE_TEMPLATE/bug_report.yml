name: Bug report
description: Report a problem with the phpstorm-mcp skill, validation, packaging, or workflows
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime skill guidance
        - Reference guidance
        - PhpStorm MCP capability classification
        - Validation script
        - Release packaging
        - GitHub Actions workflow
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Operating system:
        - PhpStorm version:
        - PhpStorm MCP version:
        - PHP runtime:
        - Composer runtime:
