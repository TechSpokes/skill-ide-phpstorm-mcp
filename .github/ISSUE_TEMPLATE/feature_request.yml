name: Feature request
description: Suggest an improvement to the phpstorm-mcp skill
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem would this improvement solve?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Describe any PhpStorm MCP behavior, fixture test, or project observation behind the request.
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change and where it belongs.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SKILL.md
        - References
        - Maintenance sweep
        - Packaging
        - Documentation
        - Other
