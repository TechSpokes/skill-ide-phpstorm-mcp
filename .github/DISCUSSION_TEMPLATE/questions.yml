title: "Questions And Help"
labels: ["question", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Ask questions about using or maintaining the phpstorm-mcp skill.
  - type: dropdown
    id: question-type
    attributes:
      label: Question Type
      options:
        - Installing the skill
        - Using PhpStorm MCP
        - Tool selection
        - Capability sweeps
        - Safety boundaries
        - Release packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What specific help do you need?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share versions, commands, or public examples. Do not include secrets or private project material.
