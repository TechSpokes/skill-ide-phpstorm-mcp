title: "Usage Reports"
labels: ["showcase", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Share non-private usage results from the phpstorm-mcp skill.
  - type: textarea
    id: project-context
    attributes:
      label: Project Context
      description: Describe the public or sanitized project context.
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What did the skill help the agent do?
    validations:
      required: true
  - type: textarea
    id: lessons
    attributes:
      label: Lessons Learned
      description: What should maintainers improve?
