title: "Ideas And Suggestions"
labels: ["enhancement", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Share ideas for improving the phpstorm-mcp skill.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What improvement would you like to see?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Describe any tested PhpStorm MCP behavior behind the idea.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime skill
        - References
        - Capability sweep
        - Safety guidance
        - Packaging
        - Documentation
        - Other
