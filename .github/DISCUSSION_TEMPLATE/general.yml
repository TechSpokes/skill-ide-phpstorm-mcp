title: "General Discussion"
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Start a general discussion about the phpstorm-mcp skill.
  - type: dropdown
    id: topic-category
    attributes:
      label: Topic Category
      options:
        - Skill behavior
        - PhpStorm MCP capabilities
        - Tool routing
        - Safety boundaries
        - Packaging and releases
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: discussion-topic
    attributes:
      label: Discussion Topic
      description: What would you like to discuss?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add non-private background that would help others understand the topic.
